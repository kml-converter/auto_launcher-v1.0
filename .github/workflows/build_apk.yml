name: Compilazione Automatica APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configura Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. SOLUZIONE: Genera il file local.properties richiesto da build.gradle.kts
      - name: Genera local.properties di Flutter
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Installa dipendenze (Pub Get)
        run: flutter pub get

      - name: Compilazione APK Release
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Carica l'APK nei file scaricabili
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Launcher-APK
          path: build/app/outputs/flutter-apk/app-release.apk
